<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Parceiros LSA — Sistema Avançado</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
/* --- DESIGN SYSTEM --- */
:root {
  --bg-primary: #FFFFFF; --bg-secondary: #F9FAFB; --bg-tertiary: #F3F4F6;
  --surface: #FFFFFF; --border: #E5E7EB;
  --text-primary: #111827; --text-secondary: #4B5563; --text-tertiary: #9CA3AF;
  --blue: #3B82F6; --blue-hover: #2563EB; --blue-bg: rgba(59,130,246,0.1);
  --red: #EF4444; --red-bg: rgba(239,68,68,0.1);
  --green: #10B981; --green-bg: rgba(16,185,129,0.1);
  --yellow: #F59E0B;
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px;
  --font-sans: 'Inter', system-ui, sans-serif;
  --radius-lg: 0.75rem; --radius-xl: 1rem;
}
.dark { --bg-primary: #0F172A; --bg-secondary: #1E293B; --surface: #1E293B;
  --border: #334155; --text-primary: #F1F5F9; --text-secondary: #CBD5E1;
  --blue: #60A5FA; --red: #F87171; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); transition: background 0.2s; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
.app-header { position: sticky; top: 0; z-index: 50; background: var(--surface); border-bottom: 1px solid var(--border); backdrop-filter: blur(8px); }
.header-content { padding: var(--space-4) var(--space-5); display: flex; align-items: center; justify-content: space-between; max-width: 1400px; margin: 0 auto; }
.logo h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--blue), #8B5CF6); -webkit-background-clip: text; background-clip: text; color: transparent; }
.header-actions { display: flex; gap: var(--space-3); }
.theme-toggle, .back-btn { background: var(--bg-tertiary); border-radius: 999px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
.back-btn { width: auto; padding: 0 16px; border-radius: 20px; }
.container { max-width: 1400px; margin: 0 auto; padding: var(--space-4) var(--space-5); }
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-6); }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: var(--space-4); box-shadow: var(--shadow-sm); }
.stat-title { font-size: 0.875rem; color: var(--text-tertiary); }
.stat-value { font-size: 1.875rem; font-weight: 800; }
.filters-bar { display: flex; flex-wrap: wrap; gap: var(--space-3); margin-bottom: var(--space-5); align-items: center; }
.search-input, .sort-select { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-2) var(--space-3); color: var(--text-primary); flex: 1; }
.filter-btn { background: var(--bg-tertiary); padding: var(--space-2) var(--space-4); border-radius: var(--radius-lg); }
.filter-btn.active { background: var(--blue); color: white; }
.process-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); margin-bottom: var(--space-4); overflow: hidden; transition: all 0.2s; }
.card-header { display: flex; align-items: center; gap: var(--space-4); padding: var(--space-4); cursor: pointer; }
.avatar { width: 52px; height: 52px; border-radius: var(--radius-xl); background: var(--blue-bg); color: var(--blue); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.25rem; }
.card-info { flex: 1; }
.card-title { font-weight: 700; }
.progress-bar { margin-top: var(--space-2); height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.2s; }
.badge-priority { padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
.badge-high { background: var(--red-bg); color: var(--red); }
.badge-medium { background: rgba(245,158,11,0.1); color: var(--yellow); }
.badge-low { background: var(--green-bg); color: var(--green); }
.expand-icon { transition: transform 0.2s; }
.expand-icon.open { transform: rotate(180deg); }
.card-body { border-top: 1px solid var(--border); padding: var(--space-4); background: var(--bg-secondary); }
.toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--surface); padding: 10px 20px; border-radius: 999px; box-shadow: var(--shadow-lg); font-size: 0.875rem; border-left: 4px solid var(--blue); pointer-events: auto; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; }
@media (min-width: 768px) { .modal-overlay { align-items: center; } }
.modal-sheet { background: var(--surface); width: 100%; max-width: 600px; max-height: 90dvh; border-radius: 1.5rem 1.5rem 0 0; overflow-y: auto; }
@media (min-width: 768px) { .modal-sheet { border-radius: 1.5rem; margin: 20px; } }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.modal-body { padding: 20px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 4px; }
.field input, .field select, .field textarea { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 8px 12px; color: var(--text-primary); }
.prio-btn { padding: 6px 12px; border-radius: 999px; background: var(--bg-tertiary); margin-right: 8px; }
.prio-btn.active { background: var(--blue); color: white; }
.fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 28px; background: var(--blue); color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-lg); }
.hidden { display: none; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toastContainer" class="toast-container"></div>
<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDp-pkn5NBp8LRaR9n4r-sywoH9UMrLG-A",
  authDomain: "parceiroslsa.firebaseapp.com",
  projectId: "parceiroslsa",
  storageBucket: "parceiroslsa.firebasestorage.app",
  messagingSenderId: "98070827490",
  appId: "1:98070827490:web:ed0cc0c91a2f659365a9bb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const ADMIN_SENHA = '1234';
const TIPOS = ['Aposentadoria por Invalidez','Auxílio-Doença','BPC/LOAS','Aposentadoria por Idade','Aposentadoria por Tempo de Contribuição','Pensão por Morte','Auxílio-Acidente','Revisão de Benefício','Outros'];
const PPAD = ['Laudo médico','Receitas médicas','Comprovante de residência','RG / CPF','CTPS','Extrato do CNIS','Procuração','Documentos do INSS','Atestado médico','Exame complementar','Comprovante de renda','Certidão de nascimento'];

let tela = 'login', indicadores = [], processos = [], indAtual = null, expCard = null, unsubInd = null, unsubProc = null, isAdmin = false;
let filtroStatus = 'pendentes', searchTerm = '', ordenacao = 'data_asc';
let fNome = '', fTipo = TIPOS[0], fPends = [], fObs = '', editId = null, delId = null, fPrioridade = 'media';
let editIndId = null, delIndId = null;

function showToast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
function loadTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') document.body.classList.add('dark');
  else if (saved === 'light') document.body.classList.remove('dark');
  else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.classList.add('dark');
}
function ini(n) {
  if (!n) return '??';
  const parts = n.trim().split(' ');
  if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}
function fdt(ts) {
  return ts?.toDate ? ts.toDate().toLocaleDateString('pt-BR') : '—';
}
function unsubAll() {
  if (unsubInd) unsubInd();
  if (unsubProc) unsubProc();
  unsubInd = unsubProc = null;
}
function render() {
  const app = document.getElementById('app');
  if (tela === 'login') {
    app.innerHTML = `<div class="container" style="max-width:400px;margin:40px auto"><div class="logo"><h1>Parceiros LSA</h1></div><div style="margin-top:32px"><input id="pinInput" type="number" placeholder="Digite seu PIN" style="width:100%;padding:12px;margin-bottom:12px"><button id="btnPin" class="filter-btn active" style="width:100%">Entrar</button><button id="btnAdmin" class="filter-btn" style="width:100%;margin-top:8px">Acesso do Advogado</button><div id="loginErr" style="color:var(--red);margin-top:8px"></div></div></div>`;
    document.getElementById('btnPin').onclick = () => {
      const pin = document.getElementById('pinInput').value.trim();
      if (pin === ADMIN_SENHA) {
        isAdmin = true;
        tela = 'admin';
        render();
      } else {
        db.collection('indicadores').where('pin', '==', pin).limit(1).get().then(snap => {
          if (snap.empty) document.getElementById('loginErr').innerText = 'PIN inválido';
          else {
            indAtual = { id: snap.docs[0].id, ...snap.docs[0].data() };
            isAdmin = false;
            tela = 'indicador';
            render();
          }
        });
      }
    };
    document.getElementById('btnAdmin').onclick = () => { tela = 'adminAuth'; render(); };
  } else if (tela === 'adminAuth') {
    app.innerHTML = `<div class="container" style="max-width:400px;margin:40px auto"><div class="logo"><h1>Acesso Advogado</h1></div><div style="margin-top:32px"><input id="adminPass" type="password" placeholder="Senha" style="width:100%;padding:12px"><button id="btnAdminEnter" class="filter-btn active" style="width:100%;margin-top:12px">Entrar</button><button id="btnBack" class="filter-btn" style="width:100%;margin-top:8px">Voltar</button><div id="adminErr" style="color:var(--red)"></div></div></div>`;
    document.getElementById('btnAdminEnter').onclick = () => {
      if (document.getElementById('adminPass').value === ADMIN_SENHA) {
        isAdmin = true;
        tela = 'admin';
        render();
      } else document.getElementById('adminErr').innerText = 'Senha incorreta';
    };
    document.getElementById('btnBack').onclick = () => { tela = 'login'; render(); };
  } else if (tela === 'admin') {
    unsubAll();
    unsubInd = db.collection('indicadores').onSnapshot(snap => {
      indicadores = [];
      snap.forEach(d => indicadores.push({ id: d.id, ...d.data() }));
      renderAdminList();
    });
    renderAdminList();
  } else if (tela === 'indicador') {
    unsubAll();
    unsubProc = db.collection('processos').where('indicadorId', '==', indAtual.id).onSnapshot(snap => {
      processos = [];
      snap.forEach(d => processos.push({ id: d.id, ...d.data() }));
      renderIndicadorList();
    });
    renderIndicadorList();
  }
}
function renderAdminList() {
  const app = document.getElementById('app');
  let html = `<div class="app-header"><div class="header-content"><div class="logo"><h1>Painel Administrativo</h1></div><div class="header-actions"><button class="theme-toggle" onclick="toggleTheme()">🌓</button><button class="back-btn" onclick="tela='login';render()">Sair</button></div></div></div><div class="container"><div class="dashboard-grid"><div class="stat-card"><div class="stat-title">Indicadores</div><div class="stat-value">${indicadores.length}</div></div><div class="stat-card"><div class="stat-title">Processos Pendentes</div><div class="stat-value">${processos.filter(p => p.pends?.length).length}</div></div></div><div class="filters-bar"><input type="text" id="searchInput" class="search-input" placeholder="Buscar indicador..."><button class="fab" onclick="openIndModal()">+</button></div><div id="indicadoresList"></div></div>`;
  app.innerHTML = html;
  const container = document.getElementById('indicadoresList');
  if (!indicadores.length) container.innerHTML = '<div class="stat-card">Nenhum indicador cadastrado. Clique em + para adicionar.</div>';
  else {
    let listHtml = '';
    indicadores.forEach(ind => {
      listHtml += `<div class="process-card"><div class="card-header" onclick="selecionarIndicador('${ind.id}')"><div class="avatar">${ini(ind.nome)}</div><div class="card-info"><div class="card-title">${ind.nome}</div><div class="card-subtitle">PIN: ${ind.pin}</div></div><div><button class="filter-btn" onclick="event.stopPropagation();editInd('${ind.id}')">✏️</button><button class="filter-btn" style="background:var(--red-bg);color:var(--red)" onclick="event.stopPropagation();delInd('${ind.id}')">🗑️</button></div></div></div>`;
    });
    container.innerHTML = listHtml;
  }
  document.getElementById('searchInput')?.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    document.querySelectorAll('#indicadoresList .process-card').forEach(card => {
      const nome = card.querySelector('.card-title')?.innerText.toLowerCase();
      card.style.display = nome?.includes(term) ? '' : 'none';
    });
  });
}
function renderIndicadorList() {
  const app = document.getElementById('app');
  const pendentes = processos.filter(p => p.pends?.length > 0);
  let list = filtroStatus === 'todos' ? processos : pendentes;
  if (ordenacao === 'data_asc') list.sort((a,b) => (a.data?.toDate?.()||0) - (b.data?.toDate?.()||0));
  else list.sort((a,b) => (b.data?.toDate?.()||0) - (a.data?.toDate?.()||0));
  let html = `<div class="app-header"><div class="header-content"><div class="logo"><h1>${indAtual.nome}</h1></div><div class="header-actions"><button class="theme-toggle" onclick="toggleTheme()">🌓</button><button class="back-btn" onclick="tela='admin';render()">Voltar</button></div></div></div><div class="container"><div class="dashboard-grid"><div class="stat-card"><div class="stat-title">Processos Pendentes</div><div class="stat-value">${pendentes.length}</div></div></div><div class="filters-bar"><select id="sortSelect" class="sort-select"><option value="data_asc" ${ordenacao==='data_asc'?'selected':''}>Mais antigos primeiro</option><option value="data_desc" ${ordenacao==='data_desc'?'selected':''}>Mais recentes primeiro</option></select><button class="filter-btn ${filtroStatus === 'pendentes' ? 'active' : ''}" onclick="filtroStatus='pendentes';renderIndicadorList()">Pendentes</button><button class="filter-btn ${filtroStatus === 'todos' ? 'active' : ''}" onclick="filtroStatus='todos';renderIndicadorList()">Todos</button></div><div id="processosList"></div>${isAdmin ? '<button class="fab" onclick="openProcModal()">+</button>' : ''}</div>`;
  app.innerHTML = html;
  let listHtml = '';
  list.forEach(proc => {
    const totalPends = proc.pends?.length || 0;
    const progresso = 0;
    let badgeClass = 'badge-medium';
    const prioridade = proc.prioridade || 'media';
    if (prioridade === 'alta') badgeClass = 'badge-high';
    else if (prioridade === 'baixa') badgeClass = 'badge-low';
    listHtml += `<div class="process-card"><div class="card-header" onclick="expCard='${expCard === proc.id ? '' : proc.id}';renderIndicadorList()"><div class="avatar">${ini(proc.nome)}</div><div class="card-info"><div class="card-title">${proc.nome}</div><div class="card-subtitle">${proc.tipo}</div><div class="progress-bar"><div class="progress-fill" style="width:${progresso}%"></div></div></div><div class="badge-priority ${badgeClass}">${prioridade === 'alta' ? 'Urgente' : prioridade === 'baixa' ? 'Baixa' : 'Média'}</div><span class="expand-icon ${expCard === proc.id ? 'open' : ''}">▼</span></div>${expCard === proc.id ? `<div class="card-body"><div class="card-subtitle">Pendências:</div><div class="pend-chips">${(proc.pends || []).map(p => `<span class="filter-btn" style="background:var(--red-bg);color:var(--red);margin:4px">${p}</span>`).join('')}</div>${proc.obs ? `<div><strong>Obs:</strong> ${proc.obs}</div>` : ''}${isAdmin ? `<div style="margin-top:12px"><button class="filter-btn" onclick="editProc('${proc.id}')">✏️ Editar</button><button class="filter-btn" style="background:var(--red-bg);color:var(--red)" onclick="delProc('${proc.id}')">🗑️ Remover</button><button class="filter-btn active" onclick="marcarOK('${proc.id}')">✓ Marcar OK</button></div>` : ''}</div>` : ''}</div>`;
  });
  document.getElementById('processosList').innerHTML = listHtml || '<div class="stat-card">Nenhum processo com pendências.</div>';
  document.getElementById('sortSelect').onchange = (e) => { ordenacao = e.target.value; renderIndicadorList(); };
}
window.selecionarIndicador = (id) => {
  indAtual = indicadores.find(i => i.id === id);
  tela = 'indicador';
  render();
};
window.editInd = (id) => {
  const ind = indicadores.find(i => i.id === id);
  if (ind) {
    editIndId = id;
    fIndNome = ind.nome;
    fIndPin = ind.pin;
    openIndModal();
  }
};
window.delInd = (id) => {
  if (confirm('Remover indicador e todos os processos?')) {
    db.collection('processos').where('indicadorId', '==', id).get().then(snap => {
      const batch = db.batch();
      snap.forEach(d => batch.delete(d.ref));
      batch.delete(db.collection('indicadores').doc(id));
      return batch.commit();
    }).then(() => showToast('Removido')).catch(e => showToast('Erro', 'error'));
  }
};
function openIndModal() {
  const nome = prompt('Nome do indicador:', fIndNome || '');
  const pin = prompt('PIN (4 dígitos):', fIndPin || '');
  if (nome && pin) {
    if (editIndId) {
      db.collection('indicadores').doc(editIndId).update({ nome, pin }).then(() => {
        showToast('Atualizado');
        editIndId = null;
        render();
      });
    } else {
      db.collection('indicadores').add({ nome, pin, criadoEm: firebase.firestore.FieldValue.serverTimestamp() }).then(() => showToast('Cadastrado'));
    }
  }
}
window.openProcModal = () => {
  fNome = '';
  fTipo = TIPOS[0];
  fPends = [];
  fObs = '';
  editId = null;
  fPrioridade = 'media';
  const modalHtml = `<div class="modal-overlay" id="procModal"><div class="modal-sheet"><div class="modal-header"><h3>${editId ? 'Editar Processo' : 'Novo Processo'}</h3><button onclick="closeProcModal()">✖️</button></div><div class="modal-body"><div class="field"><label>Nome do cliente</label><input id="procNome" value="${fNome}"></div><div class="field"><label>Tipo</label><select id="procTipo">${TIPOS.map(t => `<option ${t === fTipo ? 'selected' : ''}>${t}</option>`).join('')}</select></div><div class="field"><label>Pendências</label><div id="pendList"></div><div style="display:flex;gap:8px;margin-top:8px"><input id="customPend" placeholder="Personalizada" style="flex:1"><button class="filter-btn" onclick="addCustomPend()">+</button></div></div><div class="field"><label>Observações</label><textarea id="procObs">${fObs}</textarea></div><div class="field"><label>Prioridade</label><div><button class="prio-btn ${fPrioridade === 'alta' ? 'active' : ''}" onclick="setPrio('alta')">Alta</button><button class="prio-btn ${fPrioridade === 'media' ? 'active' : ''}" onclick="setPrio('media')">Média</button><button class="prio-btn ${fPrioridade === 'baixa' ? 'active' : ''}" onclick="setPrio('baixa')">Baixa</button></div></div><button class="filter-btn active" onclick="saveProc()">Salvar</button></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  renderPendList();
  window.setPrio = (p) => {
    fPrioridade = p;
    document.querySelectorAll('.prio-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
  };
  window.addCustomPend = () => {
    const val = document.getElementById('customPend').value.trim();
    if (val && !fPends.includes(val)) {
      fPends.push(val);
      renderPendList();
      document.getElementById('customPend').value = '';
    }
  };
  window.saveProc = () => {
    const nome = document.getElementById('procNome').value.trim();
    const tipo = document.getElementById('procTipo').value;
    const obs = document.getElementById('procObs').value;
    if (!nome) return showToast('Nome obrigatório', 'error');
    const data = {
      indicadorId: indAtual.id,
      nome,
      tipo,
      pends: fPends,
      obs,
      prioridade: fPrioridade,
      data: firebase.firestore.FieldValue.serverTimestamp()
    };
    if (editId) {
      db.collection('processos').doc(editId).update(data).then(() => {
        showToast('Atualizado');
        closeProcModal();
        render();
      });
    } else {
      db.collection('processos').add(data).then(() => {
        showToast('Cadastrado');
        closeProcModal();
        render();
      });
    }
  };
  window.closeProcModal = () => document.getElementById('procModal')?.remove();
};
function renderPendList() {
  const div = document.getElementById('pendList');
  if (div) {
    div.innerHTML = PPAD.map(p => `<button class="filter-btn" style="margin:4px;background:${fPends.includes(p) ? 'var(--blue)' : 'var(--bg-tertiary)'};color:${fPends.includes(p) ? 'white' : 'var(--text-primary)'}" onclick="togglePend('${p}')">${p}</button>`).join('');
  }
}
window.togglePend = (p) => {
  const idx = fPends.indexOf(p);
  if (idx >= 0) fPends.splice(idx, 1);
  else fPends.push(p);
  renderPendList();
};
window.editProc = (id) => {
  const proc = processos.find(p => p.id === id);
  if (proc) {
    editId = id;
    fNome = proc.nome;
    fTipo = proc.tipo;
    fPends = proc.pends || [];
    fObs = proc.obs || '';
    fPrioridade = proc.prioridade || 'media';
    openProcModal();
  }
};
window.delProc = (id) => {
  if (confirm('Remover processo?')) {
    db.collection('processos').doc(id).delete().then(() => showToast('Removido')).catch(e => showToast('Erro', 'error'));
  }
};
window.marcarOK = (id) => {
  db.collection('processos').doc(id).update({ pends: [] }).then(() => showToast('Processo OK!')).catch(e => showToast('Erro', 'error'));
};
loadTheme();
render();
</script>
</body>
</html>
